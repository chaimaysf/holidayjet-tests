name: Playwright Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  BASE_URL_TEST: https://www.holidayjet.co.uk
  BASE_URL_PREPROD: https://preprod.holidayjet.co.uk

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        environment: [test, preprod]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run tests on ${{ matrix.environment }}
        run: npx playwright test --project=chromium
        env:
          BASE_URL: ${{ matrix.environment == 'test' && env.BASE_URL_TEST || env.BASE_URL_PREPROD }}

      - name: Upload report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-${{ matrix.environment }}
          path: playwright-report/
          retention-days: 30